{% extends 'base.html' %}
{% block page_title %}Delete Question{% endblock %}
{% block content %}
<div style="max-width:520px;">
  <div class="page-card text-center">
    <i class="bi bi-exclamation-triangle-fill text-danger" style="font-size:2.5rem;"></i>
    <h5 class="mt-3 fw-bold">Delete this question?</h5>
    <p class="text-muted" style="font-size:.875rem;">
      "{{ question.content|truncatechars:100 }}"
    </p>
    <div class="d-flex gap-2 justify-content-center mt-4">
      <a href="{% url 'assessments:question_list' course.pk %}"
         class="btn btn-outline-secondary">Cancel</a>
      <form method="post" class="d-inline">{% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, delete</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
