{% extends 'base.html' %}
{% block title %}Django Admin — INSTAASYS{% endblock %}
{% block page_title %}Django Admin{% endblock %}
{% block content %}
<style>
  .admin-frame-container {
    position: relative;
    height: calc(100vh - 130px);
    border: 1px solid #e2e8f0;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,.05);
    background: #fff;
  }
  .admin-frame-container iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }
  .loading-overlay {
    position: absolute;
    inset: 0;
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 1rem;
    z-index: 10;
  }
  .loading-spinner {
    width: 38px; height: 38px;
    border: 3px solid #e2e8f0;
    border-top-color: #4f46e5;
    border-radius: 50%;
    animation: spin .75s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>

<div class="admin-frame-container">
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
    <p style="color:#64748b;font-size:.83rem;margin:0;">Loading Django Admin…</p>
  </div>
  <iframe src="/admin/" id="adminIframe" title="Django Administration"></iframe>
</div>

<script>
  document.getElementById('adminIframe').addEventListener('load', function () {
    try {
      const doc = this.contentDocument || this.contentWindow.document;
      const s = doc.createElement('style');
      s.textContent = `
        #header { display: none !important; }
        div.breadcrumbs { border-radius: 0 !important; }
        body { padding-top: 0 !important; }
      `;
      doc.head.appendChild(s);
    } catch (e) {}
    document.getElementById('loadingOverlay').style.display = 'none';
  });
</script>
{% endblock %}
