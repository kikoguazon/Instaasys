{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ plan.topic }} — INSTAASYS Slideshow</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=Playfair+Display:wght@700;800&family=Space+Grotesk:wght@500;700&family=Merriweather:wght@700;900&family=JetBrains+Mono:wght@500;700&family=Cormorant+Garamond:wght@600;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════════════════
   INSTAASYS Slideshow — Base Variables (fallback until palette injected)
   ═══════════════════════════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --s-bg:             #0f172a;
  --s-bg-light:       #f8fafc;
  --s-bg-card:        #f1f5f9;
  --s-accent:         #3b82f6;
  --s-accent-soft:    #dbeafe;
  --s-accent-dark:    #1e40af;
  --s-text:           #f1f5f9;
  --s-text-dark:      #1e293b;
  --s-text-muted:     #94a3b8;
  --s-text-on-accent: #ffffff;
  --s-border:         #e2e8f0;
  --s-gradient-start: #1e3a5f;
  --s-gradient-end:   #0f172a;
  --s-notes-bg:       #1e293b;
  --s-notes-text:     #cbd5e1;
  --s-font-heading:   'Playfair Display', 'Inter', serif;
  --s-font-body:      'Inter', sans-serif;
  --s-obj-color:      #1e40af;
  --s-mid:            #1e293b;
  --s-content-accent-1:#3b82f6;
  --s-content-accent-2:#0d9488;
  --s-content-accent-3:#4338ca;
  --s-content-accent-4:#d97706;
  --s-content-accent-5:#7c3aed;
  --s-content-accent-6:#1e40af;
  --s-transition: .4s cubic-bezier(.16,1,.3,1);
  --s-slide-radius:   14px;
  --s-card-radius:    10px;
  --s-chip-radius:    6px;
}

/* ═══════════════════════════════════════════════════════════════════════
   Design Variants — per-lesson visual identity
   Each variant overrides typography, default colors, and shape language.
   AI-generated palette (injected after this block) wins for color tokens.
   ═══════════════════════════════════════════════════════════════════════ */

/* Minimalist — clean, monochrome + single accent, sharp corners */
[data-design="minimalist"] {
  --s-font-heading: 'Inter', sans-serif;
  --s-font-body:    'Inter', sans-serif;
  --s-bg:             #111827;
  --s-bg-light:       #ffffff;
  --s-bg-card:        #f9fafb;
  --s-accent:         #111827;
  --s-accent-dark:    #000000;
  --s-accent-soft:    #f3f4f6;
  --s-gradient-start: #1f2937;
  --s-gradient-end:   #111827;
  --s-mid:            #374151;
  --s-obj-color:      #111827;
  --s-border:         #e5e7eb;
  --s-slide-radius:   4px;
  --s-card-radius:    4px;
  --s-chip-radius:    2px;
}

/* Academic — serif, navy & burgundy, traditional */
[data-design="academic"] {
  --s-font-heading: 'Playfair Display', 'Merriweather', serif;
  --s-font-body:    'Merriweather', 'Inter', serif;
  --s-bg:             #1a1f36;
  --s-bg-light:       #faf7f2;
  --s-bg-card:        #f5f0e6;
  --s-accent:         #8b1e3f;
  --s-accent-dark:    #5c0f26;
  --s-accent-soft:    #f8e6eb;
  --s-gradient-start: #242b4d;
  --s-gradient-end:   #1a1f36;
  --s-mid:            #2d3555;
  --s-obj-color:      #8b1e3f;
  --s-border:         #e6dfd1;
  --s-slide-radius:   6px;
  --s-card-radius:    6px;
  --s-chip-radius:    4px;
}

/* Modern — geometric sans, blue + amber, medium radius */
[data-design="modern"] {
  --s-font-heading: 'Space Grotesk', 'Inter', sans-serif;
  --s-font-body:    'Inter', sans-serif;
  --s-bg:             #0f172a;
  --s-bg-light:       #f8fafc;
  --s-bg-card:        #f1f5f9;
  --s-accent:         #2563eb;
  --s-accent-dark:    #1d4ed8;
  --s-accent-soft:    #dbeafe;
  --s-gradient-start: #1e3a8a;
  --s-gradient-end:   #0f172a;
  --s-mid:            #1e293b;
  --s-obj-color:      #2563eb;
  --s-border:         #e2e8f0;
  --s-slide-radius:   14px;
  --s-card-radius:    10px;
  --s-chip-radius:    8px;
}

/* Creative — purple + pink gradients, large radius, playful */
[data-design="creative"] {
  --s-font-heading: 'Space Grotesk', sans-serif;
  --s-font-body:    'Inter', sans-serif;
  --s-bg:             #2a1a3d;
  --s-bg-light:       #fdf4ff;
  --s-bg-card:        #fae8ff;
  --s-accent:         #c026d3;
  --s-accent-dark:    #86198f;
  --s-accent-soft:    #fae8ff;
  --s-gradient-start: #7e22ce;
  --s-gradient-end:   #ec4899;
  --s-mid:            #4a1e65;
  --s-obj-color:      #c026d3;
  --s-border:         #f0d6f9;
  --s-slide-radius:   24px;
  --s-card-radius:    18px;
  --s-chip-radius:    999px;
}

/* Corporate — conservative, navy + slate, sharp lines */
[data-design="corporate"] {
  --s-font-heading: 'Merriweather', serif;
  --s-font-body:    'Inter', sans-serif;
  --s-bg:             #0c1326;
  --s-bg-light:       #f1f5f9;
  --s-bg-card:        #e2e8f0;
  --s-accent:         #1e3a8a;
  --s-accent-dark:    #172554;
  --s-accent-soft:    #dbeafe;
  --s-gradient-start: #1e293b;
  --s-gradient-end:   #0c1326;
  --s-mid:            #1e293b;
  --s-obj-color:      #1e3a8a;
  --s-border:         #cbd5e1;
  --s-slide-radius:   2px;
  --s-card-radius:    2px;
  --s-chip-radius:    2px;
}

/* Nature — greens + earth tones, organic rounding */
[data-design="nature"] {
  --s-font-heading: 'Merriweather', serif;
  --s-font-body:    'Inter', sans-serif;
  --s-bg:             #1c2b1f;
  --s-bg-light:       #f7f4ea;
  --s-bg-card:        #ede6d1;
  --s-accent:         #4d7c0f;
  --s-accent-dark:    #365314;
  --s-accent-soft:    #ecfccb;
  --s-gradient-start: #365314;
  --s-gradient-end:   #1c2b1f;
  --s-mid:            #3f4d2f;
  --s-obj-color:      #4d7c0f;
  --s-border:         #dcd4b8;
  --s-slide-radius:   20px;
  --s-card-radius:    16px;
  --s-chip-radius:    999px;
}

/* Tech — futuristic, dark + neon cyan, monospace chips */
[data-design="tech"] {
  --s-font-heading: 'Space Grotesk', 'Inter', sans-serif;
  --s-font-body:    'Inter', sans-serif;
  --s-bg:             #020617;
  --s-bg-light:       #0b1120;
  --s-bg-card:        #111827;
  --s-accent:         #06b6d4;
  --s-accent-dark:    #0e7490;
  --s-accent-soft:    #164e63;
  --s-gradient-start: #083344;
  --s-gradient-end:   #020617;
  --s-mid:            #0b1a2f;
  --s-obj-color:      #06b6d4;
  --s-border:         #1e293b;
  --s-text-dark:      #e2e8f0;
  --s-text-muted:     #64748b;
  --s-slide-radius:   6px;
  --s-card-radius:    4px;
  --s-chip-radius:    2px;
}
[data-design="tech"] .header-badge,
[data-design="tech"] .course-chip,
[data-design="tech"] .title-week {
  font-family: 'JetBrains Mono', monospace;
}
[data-design="tech"] .slide-content,
[data-design="tech"] .slide-multi,
[data-design="tech"] .slide-objectives,
[data-design="tech"] .split-wrap { background: var(--s-bg-light); }
[data-design="tech"] .bullet-list li,
[data-design="tech"] .obj-text,
[data-design="tech"] .block-card-body { color: #cbd5e1; }
[data-design="tech"] .block-card { background: #0f1b30; border-color: #1e293b; }

/* Elegant — Cormorant Garamond serif, cream + gold */
[data-design="elegant"] {
  --s-font-heading: 'Cormorant Garamond', 'Playfair Display', serif;
  --s-font-body:    'Inter', sans-serif;
  --s-bg:             #1f1b14;
  --s-bg-light:       #fbf7ef;
  --s-bg-card:        #f5eede;
  --s-accent:         #b08d57;
  --s-accent-dark:    #8a6a3e;
  --s-accent-soft:    #f3e9d2;
  --s-gradient-start: #2a2418;
  --s-gradient-end:   #1f1b14;
  --s-mid:            #342c1e;
  --s-obj-color:      #b08d57;
  --s-border:         #e8dec4;
  --s-slide-radius:   2px;
  --s-card-radius:    2px;
  --s-chip-radius:    0;
}
[data-design="elegant"] .slide-title h1,
[data-design="elegant"] .slide-section h2,
[data-design="elegant"] .slide-summary h2 { font-weight: 600; letter-spacing: .01em; }

/* Apply shape variables to existing layout elements */
.slide-frame    { border-radius: var(--s-slide-radius); }
.obj-item,
.block-card     { border-radius: var(--s-card-radius); }
.course-chip,
.header-badge   { border-radius: var(--s-chip-radius); }

/* ═══════════════════════════════════════════════════════════════════════
   Shell
   ═══════════════════════════════════════════════════════════════════════ */
html, body {
  height: 100%; overflow: hidden;
  font-family: var(--s-font-body);
  background: #000;
}

#slideshow {
  height: 100vh;
  display: grid;
  grid-template-rows: auto 1fr auto;
  background: #0a0a0f;
  user-select: none;
}

/* ═══════════════════════════════════════════════════════════════════════
   Progress bar
   ═══════════════════════════════════════════════════════════════════════ */
.progress-track {
  position: fixed; top: 0; left: 0; right: 0; height: 3px;
  background: rgba(255,255,255,.08); z-index: 200;
}
.progress-fill {
  height: 100%; background: var(--s-accent);
  transition: width .5s cubic-bezier(.16,1,.3,1);
  border-radius: 0 2px 2px 0;
  box-shadow: 0 0 8px var(--s-accent);
}

/* ═══════════════════════════════════════════════════════════════════════
   Top bar
   ═══════════════════════════════════════════════════════════════════════ */
.ss-topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 150;
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 24px;
  background: linear-gradient(180deg, rgba(0,0,0,.9) 0%, transparent 100%);
  opacity: 0; transition: opacity .3s; pointer-events: none;
}
#slideshow.show-ui .ss-topbar { opacity: 1; pointer-events: auto; }

.topbar-left { display: flex; align-items: center; gap: 12px; }
.course-chip {
  background: var(--s-accent); color: #fff;
  font-size: 11px; font-weight: 700; padding: 4px 12px;
  border-radius: 6px; letter-spacing: .6px; text-transform: uppercase;
}
.topbar-title {
  color: rgba(255,255,255,.65); font-size: 13px; font-weight: 500;
  max-width: 500px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.topbar-right { display: flex; align-items: center; gap: 6px; }

.top-btn {
  background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.1);
  color: #e2e8f0; height: 34px; padding: 0 12px; border-radius: 8px;
  font-size: 12px; font-weight: 600; cursor: pointer;
  display: flex; align-items: center; gap: 6px;
  transition: background .2s, border-color .2s; font-family: inherit;
  text-decoration: none;
}
.top-btn:hover { background: rgba(255,255,255,.16); border-color: rgba(255,255,255,.2); }
.top-btn.active { background: rgba(var(--s-accent),.2); color: var(--s-accent); }
.top-btn.icon-only { width: 34px; padding: 0; justify-content: center; font-size: 15px; }

/* ═══════════════════════════════════════════════════════════════════════
   Slide viewport & frame
   ═══════════════════════════════════════════════════════════════════════ */
.slide-viewport {
  display: flex; align-items: center; justify-content: center;
  padding: 52px 64px 52px;
  overflow: hidden; position: relative;
}

.slide-frame {
  width: 100%; max-width: 1120px;
  aspect-ratio: 16 / 9;
  border-radius: 14px; overflow: hidden; position: relative;
  box-shadow: 0 32px 80px rgba(0,0,0,.6), 0 0 0 1px rgba(255,255,255,.05);
}

/* Transition animations */
.slide-frame.entering {
  animation: sEnter .42s cubic-bezier(.16,1,.3,1) forwards;
}
.slide-frame.leaving {
  animation: sLeave .28s cubic-bezier(.4,0,1,1) forwards;
}
@keyframes sEnter {
  from { opacity: 0; transform: scale(.97) translateY(10px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}
@keyframes sLeave {
  from { opacity: 1; transform: scale(1); }
  to   { opacity: 0; transform: scale(1.01); }
}

/* Slide number badge */
.slide-num {
  position: absolute; bottom: 10px; right: 14px;
  font-size: 10px; font-weight: 600;
  color: rgba(255,255,255,.3); z-index: 10; letter-spacing: .3px;
}

/* ═══════════════════════════════════════════════════════════════════════
   LAYOUT: TITLE SLIDE
   ═══════════════════════════════════════════════════════════════════════ */
.slide-title {
  height: 100%; position: relative; overflow: hidden;
  background: linear-gradient(135deg, var(--s-gradient-start) 0%, var(--s-gradient-end) 100%);
  display: flex; flex-direction: column; justify-content: center;
  padding: 56px 72px;
}

/* Left accent stripe */
.slide-title::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0;
  width: 5px; background: var(--s-accent);
}

/* Decorative circles */
.st-deco-1 {
  position: absolute; right: -60px; top: -60px;
  width: 320px; height: 320px; border-radius: 50%;
  background: radial-gradient(circle, var(--s-accent) 0%, transparent 70%);
  opacity: .08;
}
.st-deco-2 {
  position: absolute; right: 80px; bottom: -80px;
  width: 200px; height: 200px; border-radius: 50%;
  border: 2px solid var(--s-accent); opacity: .1;
}
.st-deco-3 {
  position: absolute; left: 20px; bottom: 20px;
  width: 100px; height: 100px; border-radius: 50%;
  border: 1px solid var(--s-accent); opacity: .07;
}

.title-week {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--s-accent); color: #fff;
  font-size: 11px; font-weight: 700; padding: 5px 14px;
  border-radius: 20px; margin-bottom: 20px; width: fit-content;
  letter-spacing: .8px; text-transform: uppercase;
}
.slide-title h1 {
  font-family: var(--s-font-heading);
  font-size: clamp(28px, 3.8vw, 50px);
  font-weight: 800; color: var(--s-text);
  line-height: 1.15; margin-bottom: 16px; max-width: 85%;
}
.title-course {
  font-size: clamp(13px, 1.4vw, 17px);
  color: var(--s-text-muted); font-weight: 500; margin-bottom: 8px;
}
.title-meta {
  font-size: 12px; color: var(--s-text-muted); opacity: .55;
  letter-spacing: .3px;
}
.title-accent-bar {
  width: 48px; height: 3px; background: var(--s-accent);
  border-radius: 2px; margin: 14px 0;
}

/* ═══════════════════════════════════════════════════════════════════════
   LAYOUT: OBJECTIVES
   ═══════════════════════════════════════════════════════════════════════ */
.slide-objectives {
  height: 100%; background: var(--s-bg-light);
  display: flex; flex-direction: column; padding: 40px 60px;
}
.slide-header-row {
  display: flex; align-items: flex-end; gap: 16px; margin-bottom: 28px;
}
.slide-header-icon {
  width: 44px; height: 44px;
  background: var(--s-accent); border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 20px; flex-shrink: 0;
}
.slide-header-text h2 {
  font-family: var(--s-font-heading);
  font-size: clamp(20px, 2.4vw, 30px);
  font-weight: 700; color: var(--s-text-dark);
}
.slide-header-text .sub {
  font-size: 12px; color: var(--s-text-muted); margin-top: 2px;
}
.obj-grid {
  flex: 1; display: flex; flex-direction: column;
  gap: 10px; justify-content: center;
}
.obj-item {
  display: flex; align-items: center; gap: 16px;
  padding: 12px 18px;
  background: #fff;
  border-radius: 10px;
  border: 1px solid var(--s-border);
  border-left: 4px solid var(--s-accent);
  box-shadow: 0 1px 4px rgba(0,0,0,.05);
}
.obj-num {
  width: 30px; height: 30px;
  background: var(--s-obj-color); color: #fff;
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; flex-shrink: 0;
}
.obj-text {
  font-size: clamp(13px, 1.4vw, 17px);
  color: var(--s-text-dark); line-height: 1.5; font-weight: 500;
}

/* ═══════════════════════════════════════════════════════════════════════
   LAYOUT: STANDARD CONTENT (text only or text + image)
   ═══════════════════════════════════════════════════════════════════════ */
.slide-content {
  height: 100%; background: var(--s-bg-light);
  display: flex; flex-direction: column;
}
.content-header {
  background: var(--s-bg); padding: 22px 56px;
  display: flex; align-items: center; justify-content: space-between;
  position: relative; flex-shrink: 0;
}
.content-header::after {
  content: ''; position: absolute; bottom: 0; left: 56px;
  width: 56px; height: 3px; background: var(--s-accent); border-radius: 2px;
}
.content-header h2 {
  font-family: var(--s-font-heading);
  font-size: clamp(18px, 2.2vw, 28px);
  font-weight: 700; color: var(--s-text);
}
.header-badge {
  font-size: 10px; font-weight: 700; color: var(--s-accent);
  letter-spacing: .5px; text-transform: uppercase; flex-shrink: 0;
  background: rgba(255,255,255,.06); padding: 4px 10px; border-radius: 6px;
}
.content-body {
  flex: 1; padding: 28px 56px;
  display: flex; flex-direction: column; justify-content: center;
}
.bullet-list { list-style: none; display: flex; flex-direction: column; gap: 12px; }
.bullet-list li {
  display: flex; align-items: flex-start; gap: 14px;
  font-size: clamp(14px, 1.5vw, 18px);
  color: var(--s-text-dark); line-height: 1.6;
}
.bullet-dot {
  width: 10px; height: 10px; border-radius: 3px;
  background: var(--s-accent); flex-shrink: 0; margin-top: 6px;
}
.bullet-desc {
  display: block; font-size: .88em;
  color: var(--s-text-muted); margin-top: 3px;
}
.slide-content.small-content .bullet-list li { font-size: clamp(12px, 1.2vw, 15px); gap: 10px; }

/* ── Content with image split ── */
.split-wrap {
  height: 100%; background: var(--s-bg-light);
  display: flex; flex-direction: column;
}
.split-body {
  flex: 1; display: flex; min-height: 0;
}
.split-body.rev { flex-direction: row-reverse; }
.split-text-col {
  flex: 1; padding: 24px 48px;
  display: flex; flex-direction: column; justify-content: center;
  font-size: clamp(13px, 1.35vw, 17px); color: var(--s-text-dark); line-height: 1.7;
  gap: 10px;
}
.split-visual {
  flex: 0 0 42%; min-height: 0; overflow: hidden; position: relative;
}
.split-visual img {
  width: 100%; height: 100%; object-fit: cover; display: block;
}

/* ── Hero (image bottom) ── */
.slide-hero {
  height: 100%; display: flex; flex-direction: column;
}
.hero-top {
  background: var(--s-bg); flex: 0 0 44%;
  padding: 24px 56px; display: flex; flex-direction: column; justify-content: center;
  position: relative;
}
.hero-top::after {
  content: ''; position: absolute; bottom: 0; left: 56px;
  width: 48px; height: 3px; background: var(--s-accent); border-radius: 2px;
}
.hero-top h2 {
  font-family: var(--s-font-heading);
  font-size: clamp(18px, 2.2vw, 28px); font-weight: 700; color: var(--s-text);
  margin-bottom: 10px;
}
.hero-top p {
  font-size: clamp(13px, 1.3vw, 16px); color: rgba(255,255,255,.7); line-height: 1.65;
}
.hero-bottom { flex: 1; overflow: hidden; position: relative; }
.hero-bottom img { width: 100%; height: 100%; object-fit: cover; display: block; }

/* ── Section divider ── */
.slide-section {
  height: 100%;
  background: linear-gradient(135deg, var(--s-gradient-start) 0%, var(--s-gradient-end) 100%);
  display: flex; align-items: center; justify-content: center;
  text-align: center; position: relative; overflow: hidden;
}
.slide-section::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse at 50% 50%, var(--s-accent) 0%, transparent 65%);
  opacity: .05;
}
.section-ring {
  position: absolute; width: 280px; height: 280px;
  border: 2px solid var(--s-accent); border-radius: 50%; opacity: .08;
}
.section-inner { position: relative; z-index: 1; padding: 0 80px; }
.slide-section h2 {
  font-family: var(--s-font-heading);
  font-size: clamp(30px, 4.5vw, 58px); font-weight: 800;
  color: var(--s-text); line-height: 1.15;
}
.slide-section .section-accent-line {
  width: 64px; height: 4px; background: var(--s-accent);
  border-radius: 2px; margin: 18px auto;
}
.slide-section .section-sub {
  font-size: clamp(14px, 1.5vw, 18px); color: var(--s-text-muted); line-height: 1.6;
}

/* ── Summary / Conclusion ── */
.slide-summary {
  height: 100%; position: relative;
  background: linear-gradient(135deg, var(--s-gradient-start) 0%, var(--s-gradient-end) 100%);
  padding: 44px 64px; display: flex; flex-direction: column; justify-content: center;
}
.slide-summary::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0;
  width: 5px; background: var(--s-accent);
}
.slide-summary h2 {
  font-family: var(--s-font-heading);
  font-size: clamp(22px, 2.8vw, 36px); font-weight: 700;
  color: var(--s-text); margin-bottom: 28px;
}
.summary-list { list-style: none; display: flex; flex-direction: column; gap: 10px; }
.summary-list li {
  display: flex; align-items: flex-start; gap: 14px;
  font-size: clamp(13px, 1.45vw, 17px); color: var(--s-text); opacity: .9; line-height: 1.55;
}
.check-dot {
  width: 22px; height: 22px; flex-shrink: 0; margin-top: 1px;
  background: var(--s-accent); border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; color: #fff; font-weight: 700;
}

/* ── Multi-block grid ── */
.slide-multi {
  height: 100%; background: var(--s-bg-light); display: flex; flex-direction: column;
}
.multi-grid {
  flex: 1; display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 12px; padding: 16px 48px 24px; align-content: center;
}
.block-card {
  background: #fff; border-radius: 10px; overflow: hidden;
  box-shadow: 0 2px 12px rgba(0,0,0,.07);
  display: flex; flex-direction: column;
  border: 1px solid rgba(0,0,0,.05);
}
.block-card-head {
  padding: 9px 14px; color: #fff;
  font-size: clamp(10px, .95vw, 13px); font-weight: 700;
  letter-spacing: .02em; line-height: 1.35;
}
.block-card-body {
  padding: 11px 14px;
  font-size: clamp(10px, .9vw, 13px); color: var(--s-text-dark);
  line-height: 1.6; flex: 1;
}

/* Content-accent cycling for block card headers */
.block-card:nth-child(1) .block-card-head { background: var(--s-content-accent-1); }
.block-card:nth-child(2) .block-card-head { background: var(--s-content-accent-2); }
.block-card:nth-child(3) .block-card-head { background: var(--s-content-accent-3); }
.block-card:nth-child(4) .block-card-head { background: var(--s-content-accent-4); }
.block-card:nth-child(5) .block-card-head { background: var(--s-content-accent-5); }
.block-card:nth-child(6) .block-card-head { background: var(--s-content-accent-6); }

/* ── Icon panels ── */
.icon-panel {
  flex: 0 0 42%;
  background: linear-gradient(150deg, var(--s-mid) 0%, var(--s-bg) 100%);
  display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
}
.icon-panel::before {
  content: ''; position: absolute;
  width: 280px; height: 280px; border-radius: 50%;
  border: 2px solid var(--s-accent); opacity: .08;
}
.icon-panel > i {
  font-size: clamp(5rem, 9vw, 9.5rem); color: var(--s-accent); opacity: .88;
  position: relative; z-index: 1;
  filter: drop-shadow(0 6px 28px rgba(0,0,0,.35));
}
.hero-icon {
  flex: 1; display: flex; align-items: center; justify-content: center;
  background: linear-gradient(150deg, var(--s-mid) 0%, var(--s-bg) 100%);
  position: relative; overflow: hidden;
}
.hero-icon::before {
  content: ''; position: absolute;
  width: 340px; height: 340px; border-radius: 50%;
  border: 2px solid var(--s-accent); opacity: .06;
}
.hero-icon > i {
  font-size: clamp(5rem, 10vw, 11rem); color: var(--s-accent); opacity: .85;
  position: relative; z-index: 1;
  filter: drop-shadow(0 6px 32px rgba(0,0,0,.3));
}

/* ── Image loaders & placeholders ── */
.img-loading {
  width: 100%; height: 100%;
  background: var(--s-mid);
  display: flex; align-items: center; justify-content: center;
  color: var(--s-accent); font-size: 2rem;
}
.img-loading i { animation: spin .9s linear infinite; }
.img-error {
  width: 100%; height: 100%;
  background: var(--s-mid);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 8px; color: var(--s-text-muted); font-size: 1.2rem;
}
.img-error span { font-size: 11px; opacity: .6; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ═══════════════════════════════════════════════════════════════════════
   Bottom bar
   ═══════════════════════════════════════════════════════════════════════ */
.ss-bottom {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 150;
  display: flex; align-items: center; justify-content: center; gap: 12px;
  padding: 14px 28px;
  background: linear-gradient(0deg, rgba(0,0,0,.88) 0%, transparent 100%);
  opacity: 0; transition: opacity .3s; pointer-events: none;
}
#slideshow.show-ui .ss-bottom { opacity: 1; pointer-events: auto; }

.nav-btn {
  background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.1);
  color: #e2e8f0; width: 44px; height: 44px; border-radius: 12px;
  font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: background .2s, transform .15s; font-family: inherit;
}
.nav-btn:hover { background: rgba(255,255,255,.18); transform: scale(1.06); }
.nav-btn:disabled { opacity: .2; cursor: default; transform: none; }

.slide-counter {
  color: rgba(255,255,255,.55); font-size: 13px; font-weight: 600;
  min-width: 64px; text-align: center; font-variant-numeric: tabular-nums;
}

/* ═══════════════════════════════════════════════════════════════════════
   Speaker notes
   ═══════════════════════════════════════════════════════════════════════ */
.notes-panel {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 140;
  background: var(--s-notes-bg); border-top: 2px solid var(--s-accent);
  padding: 14px 32px 72px; max-height: 130px; overflow-y: auto;
  display: none;
}
.notes-panel.visible { display: block; }
.notes-label {
  font-size: 10px; font-weight: 700; letter-spacing: .9px;
  text-transform: uppercase; color: var(--s-accent); margin-bottom: 6px; opacity: .8;
}
#notesContent { font-size: 14px; color: var(--s-notes-text); line-height: 1.65; }

/* ═══════════════════════════════════════════════════════════════════════
   Toast notification
   ═══════════════════════════════════════════════════════════════════════ */
.toast {
  position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
  background: rgba(30,30,40,.95); border: 1px solid rgba(255,255,255,.1);
  color: #f1f5f9; padding: 10px 20px; border-radius: 10px;
  font-size: 13px; font-weight: 500; z-index: 300;
  display: flex; align-items: center; gap: 8px;
  backdrop-filter: blur(12px); white-space: nowrap;
  opacity: 0; transition: opacity .3s; pointer-events: none;
}
.toast.show { opacity: 1; }
.toast i { color: #fbbf24; font-size: 15px; }

/* ═══════════════════════════════════════════════════════════════════════
   Keyboard hint
   ═══════════════════════════════════════════════════════════════════════ */
.kbd-hint {
  position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
  color: rgba(255,255,255,.3); font-size: 11px; white-space: nowrap;
  z-index: 100; pointer-events: none;
  opacity: 0; transition: opacity .3s;
}
#slideshow.show-ui .kbd-hint { opacity: 1; }
.kbd-hint kbd {
  background: rgba(255,255,255,.1); border-radius: 4px;
  padding: 2px 6px; font-family: inherit; font-size: 10px;
}
</style>
{% if palette_css %}
<style>
#slideshow[data-design] {
{{ palette_css }}
}
</style>
{% endif %}
</head>
<body>

<div id="slideshow" class="show-ui" data-design="{{ design_variant|default:'modern' }}">
  <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>

  <!-- Top bar -->
  <div class="ss-topbar">
    <div class="topbar-left">
      <span class="course-chip">{{ course.code }}</span>
      <span class="topbar-title">Week {{ plan.week_number }} — {{ plan.topic|truncatechars:55 }}</span>
    </div>
    <div class="topbar-right">
      <button class="top-btn" id="btnNotes" onclick="toggleNotes()" title="Speaker notes (N)">
        <i class="bi bi-journal-text"></i> Notes
      </button>
      <a href="{% url 'lessons:lesson_download' course.pk plan.pk %}" class="top-btn" title="Download PPTX">
        <i class="bi bi-download"></i> PPTX
      </a>
      <button class="top-btn icon-only" onclick="toggleFullscreen()" title="Fullscreen (F)">
        <i class="bi bi-fullscreen" id="fsIcon"></i>
      </button>
      <a href="{% url 'lessons:lesson_detail' course.pk plan.pk %}" class="top-btn icon-only" title="Exit (Esc)">
        <i class="bi bi-x-lg"></i>
      </a>
    </div>
  </div>

  <!-- Slide canvas -->
  <div class="slide-viewport" id="slideViewport"></div>

  <!-- Speaker notes -->
  <div class="notes-panel" id="notesPanel">
    <div class="notes-label">Speaker Notes</div>
    <div id="notesContent">No notes for this slide.</div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"><i class="bi bi-exclamation-triangle"></i> <span id="toastMsg"></span></div>

  <!-- Keyboard hint -->
  <div class="kbd-hint">
    <kbd>←</kbd><kbd>→</kbd> navigate &nbsp;·&nbsp;
    <kbd>N</kbd> notes &nbsp;·&nbsp; <kbd>F</kbd> fullscreen &nbsp;·&nbsp; <kbd>Esc</kbd> exit
  </div>

  <!-- Bottom nav -->
  <div class="ss-bottom">
    <button class="nav-btn" id="btnPrev" onclick="go(-1)"><i class="bi bi-chevron-left"></i></button>
    <span class="slide-counter" id="slideCounter">1 / 1</span>
    <button class="nav-btn" id="btnNext" onclick="go(1)"><i class="bi bi-chevron-right"></i></button>
  </div>
</div>

<script>
(function(){
'use strict';

/* ── Data ────────────────────────────────────────────────────────────── */
const SLIDES      = {{ slides_json|safe }};
const OBJECTIVES  = {{ objectives_json|safe }};
const TITLE       = {{ title_json|safe }};
const COURSE_CODE = "{{ course.code|escapejs }}";
const COURSE_NAME = "{{ course.title|escapejs }}";
const WEEK        = "{{ plan.week_number|escapejs }}";
const SEMESTER    = "{{ course.semester|default:''|escapejs }}";
const SY          = "{{ course.school_year|default:''|escapejs }}";
const IMG_API     = "{% url 'lessons:lesson_image_url_api' course.pk %}";

/* ── State ───────────────────────────────────────────────────────────── */
let current   = 0;
let showNotes = false;
let uiTimer   = null;
let toastTimer = null;

const ss       = document.getElementById('slideshow');
const viewport = document.getElementById('slideViewport');
const counter  = document.getElementById('slideCounter');
const progress = document.getElementById('progressFill');
const notes    = document.getElementById('notesPanel');
const notesTxt = document.getElementById('notesContent');
const toast    = document.getElementById('toast');
const toastMsg = document.getElementById('toastMsg');

/* ── Helpers ─────────────────────────────────────────────────────────── */
function esc(s) {
  if (s === null || s === undefined) return '';
  const d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}

function showToast(msg) {
  toastMsg.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 4000);
}

/* ── Image cache + loader ────────────────────────────────────────────── */
const _imgCache = {};

function _loadPendingImages(slide) {
  const loader = viewport.querySelector('[data-imgq]');
  if (!loader) return;
  const q = loader.dataset.imgq;
  if (!q) return;
  if (_imgCache[q]) {
    _swapImage(loader, _imgCache[q]);
    return;
  }
  fetch(`${IMG_API}?q=${encodeURIComponent(q)}`)
    .then(r => r.json())
    .then(d => {
      if (d.url) {
        _imgCache[q] = d.url;
        slide.image_url = d.url;
        const el = viewport.querySelector(`[data-imgq="${q.replace(/"/g,'&quot;')}"]`);
        if (el) _swapImage(el, d.url);
      } else {
        const el = viewport.querySelector('[data-imgq]');
        if (el) _imgFail(el);
        if (d.failed) showToast('Image unavailable — Pexels & Unsplash returned no results.');
      }
    })
    .catch(() => {
      const el = viewport.querySelector('[data-imgq]');
      if (el) _imgFail(el);
    });
}

function _swapImage(el, url) {
  const img = document.createElement('img');
  img.src = url; img.alt = '';
  img.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block;';
  el.replaceWith(img);
}

function _imgFail(el) {
  el.className = 'img-error';
  el.removeAttribute('data-imgq');
  el.innerHTML = '<i class="bi bi-image"></i><span>Image unavailable</span>';
}

function _imgLoader(q) {
  return `<div class="img-loading" data-imgq="${esc(q)}"><i class="bi bi-arrow-clockwise"></i></div>`;
}

/* ── Slide type detection ────────────────────────────────────────────── */
function getType(slide, idx) {
  const L = (slide.layout || '').toLowerCase();
  const T = (slide.title  || '').toLowerCase();
  if (idx === 0 || L === 'title')                                          return 'title';
  if (L === 'objectives' || T.includes('objective'))                       return 'objectives';
  if (L === 'section'    || L === 'divider')                               return 'section';
  if (L === 'summary'    || L === 'conclusion' ||
      T.includes('summary') || T.includes('recap') ||
      T.includes('takeaway') || T.includes('conclusion'))                  return 'summary';
  if (L === 'multi_block' || L === 'multi')                                return 'multi';
  if (L === 'hero_image_bottom')                                           return 'hero';
  if (L === 'text_left_image_right' || L === 'image_left_text_right')     return 'split';
  return 'content';
}

/* ── Bullet renderer ─────────────────────────────────────────────────── */
function renderBullets(bullets) {
  return bullets.map(b => {
    if (typeof b === 'object' && b !== null) {
      const heading = b.heading || b.title || '';
      const body    = b.content || b.text  || '';
      return `<li><span class="bullet-dot"></span><span><strong>${esc(heading)}</strong>${body ? `<span class="bullet-desc">${esc(body)}</span>` : ''}</span></li>`;
    }
    const str = String(b);
    if (str.includes(' — ')) {
      const [h, ...rest] = str.split(' — ');
      return `<li><span class="bullet-dot"></span><span><strong>${esc(h)}</strong><span class="bullet-desc">${esc(rest.join(' — '))}</span></span></li>`;
    }
    return `<li><span class="bullet-dot"></span><span>${esc(str)}</span></li>`;
  }).join('');
}

/* ── Slide HTML builders ─────────────────────────────────────────────── */
function buildTitle(slide, idx) {
  const metaParts = [];
  if (SEMESTER) metaParts.push(SEMESTER + ' Semester');
  if (SY)       metaParts.push('S.Y. ' + SY);
  return `
    <div class="slide-frame entering">
      <div class="slide-title">
        <div class="st-deco-1"></div><div class="st-deco-2"></div><div class="st-deco-3"></div>
        <div class="title-week"><i class="bi bi-calendar3"></i>Week ${esc(WEEK)}</div>
        <h1>${esc(idx === 0 ? TITLE || slide.title : slide.title)}</h1>
        <div class="title-accent-bar"></div>
        <div class="title-course">${esc(COURSE_CODE)} — ${esc(COURSE_NAME)}</div>
        ${metaParts.length ? `<div class="title-meta">${metaParts.join('  ·  ')}</div>` : ''}
      </div>
      <span class="slide-num">${idx+1} / ${SLIDES.length}</span>
    </div>`;
}

function buildObjectives(slide, idx) {
  const objs = (slide.content && slide.content.length) ? slide.content : (OBJECTIVES || []);
  const icon = slide.icon || 'bi-bullseye';
  return `
    <div class="slide-frame entering">
      <div class="slide-objectives">
        <div class="slide-header-row">
          <div class="slide-header-icon"><i class="bi ${esc(icon)}"></i></div>
          <div class="slide-header-text">
            <h2>${esc(slide.title)}</h2>
            <div class="sub">${esc(COURSE_CODE)}</div>
          </div>
        </div>
        <div class="obj-grid">
          ${objs.map((o, i) => `
            <div class="obj-item">
              <div class="obj-num">${i+1}</div>
              <div class="obj-text">${esc(typeof o === 'string' ? o : o.text || o.content || '')}</div>
            </div>`).join('')}
        </div>
      </div>
      <span class="slide-num">${idx+1} / ${SLIDES.length}</span>
    </div>`;
}

function buildSection(slide, idx) {
  const sub = Array.isArray(slide.content) ? slide.content[0] : slide.content;
  return `
    <div class="slide-frame entering">
      <div class="slide-section">
        <div class="section-ring"></div>
        <div class="section-inner">
          <h2>${esc(slide.title)}</h2>
          <div class="section-accent-line"></div>
          ${sub ? `<div class="section-sub">${esc(sub)}</div>` : ''}
        </div>
      </div>
      <span class="slide-num">${idx+1} / ${SLIDES.length}</span>
    </div>`;
}

function buildSummary(slide, idx) {
  const items = Array.isArray(slide.content) ? slide.content : [];
  return `
    <div class="slide-frame entering">
      <div class="slide-summary">
        <h2>${esc(slide.title)}</h2>
        <ul class="summary-list">
          ${items.map(b => `
            <li>
              <span class="check-dot">✓</span>
              <span>${esc(typeof b === 'string' ? b : b.text || b.content || '')}</span>
            </li>`).join('')}
        </ul>
      </div>
      <span class="slide-num">${idx+1} / ${SLIDES.length}</span>
    </div>`;
}

function buildMulti(slide, idx) {
  const icon = slide.icon || 'bi-grid';
  const rawBlocks = slide.blocks || [];
  const rawContent = slide.content || [];
  const blocks = rawBlocks.length
    ? rawBlocks
    : (Array.isArray(rawContent)
        ? rawContent.map(c => typeof c === 'object' ? c : { heading: '', content: c })
        : []);
  return `
    <div class="slide-frame entering">
      <div class="slide-multi">
        <div class="content-header">
          <h2>${esc(slide.title)}</h2>
          <span class="header-badge">${esc(COURSE_CODE)}</span>
        </div>
        <div class="multi-grid">
          ${blocks.map(b => `
            <div class="block-card">
              <div class="block-card-head">${esc(b.heading || b.title || b.term || '')}</div>
              <div class="block-card-body">${esc(b.content || b.text || b.definition || b.description || '')}</div>
            </div>`).join('')}
        </div>
      </div>
      <span class="slide-num">${idx+1} / ${SLIDES.length}</span>
    </div>`;
}

function buildHero(slide, idx) {
  const q   = slide.image_search_query || slide.image_query || slide.image_prompt || '';
  const url = slide.image_url || null;
  const icon = slide.icon || null;
  const bullets = Array.isArray(slide.content) ? slide.content : [];
  const visual = url
    ? `<div class="hero-bottom"><img src="${esc(url)}" alt=""></div>`
    : (q
        ? `<div class="hero-bottom">${_imgLoader(q)}</div>`
        : (icon
            ? `<div class="hero-icon"><i class="bi ${esc(icon)}"></i></div>`
            : ''));
  return `
    <div class="slide-frame entering">
      <div class="slide-hero">
        <div class="hero-top">
          <h2>${esc(slide.title)}</h2>
          <p>${esc(bullets[0] || '')}</p>
        </div>
        ${visual}
      </div>
      <span class="slide-num">${idx+1} / ${SLIDES.length}</span>
    </div>`;
}

function buildSplit(slide, idx, reverse) {
  const q    = slide.image_search_query || slide.image_query || slide.image_prompt || '';
  const url  = slide.image_url || null;
  const icon = slide.icon || null;
  const bullets = Array.isArray(slide.content) ? slide.content : [];
  const textHtml = bullets.length
    ? `<ul class="bullet-list">${renderBullets(bullets)}</ul>`
    : `<p>${esc(slide.description || '')}</p>`;
  const visual = url
    ? `<div class="split-visual"><img src="${esc(url)}" alt=""></div>`
    : (q
        ? `<div class="split-visual">${_imgLoader(q)}</div>`
        : (icon
            ? `<div class="icon-panel"><i class="bi ${esc(icon)}"></i></div>`
            : `<div class="icon-panel"><i class="bi bi-image"></i></div>`));
  return `
    <div class="slide-frame entering">
      <div class="split-wrap">
        <div class="content-header">
          <h2>${esc(slide.title)}</h2>
          <span class="header-badge">${esc(COURSE_CODE)}</span>
        </div>
        <div class="split-body${reverse ? ' rev' : ''}">
          <div class="split-text-col">${textHtml}</div>
          ${visual}
        </div>
      </div>
      <span class="slide-num">${idx+1} / ${SLIDES.length}</span>
    </div>`;
}

function buildContent(slide, idx) {
  const bullets = Array.isArray(slide.content) ? slide.content : (slide.content ? [slide.content] : []);
  const isRich    = bullets.some(b => typeof b === 'object' || (typeof b === 'string' && b.includes(' — ')));
  const isCrowded = bullets.length > 5;
  const smallClass = (isRich || isCrowded) ? ' small-content' : '';
  return `
    <div class="slide-frame entering">
      <div class="slide-content${smallClass}">
        <div class="content-header">
          <h2>${esc(slide.title)}</h2>
          <span class="header-badge">${esc(COURSE_CODE)}</span>
        </div>
        <div class="content-body">
          <ul class="bullet-list">${renderBullets(bullets)}</ul>
        </div>
      </div>
      <span class="slide-num">${idx+1} / ${SLIDES.length}</span>
    </div>`;
}

/* ── Master render ───────────────────────────────────────────────────── */
function render(idx) {
  const slide = SLIDES[idx];
  const type  = getType(slide, idx);
  const L     = (slide.layout || '').toLowerCase();
  let html;

  switch (type) {
    case 'title':      html = buildTitle(slide, idx);                          break;
    case 'objectives': html = buildObjectives(slide, idx);                     break;
    case 'section':    html = buildSection(slide, idx);                        break;
    case 'summary':    html = buildSummary(slide, idx);                        break;
    case 'multi':      html = buildMulti(slide, idx);                          break;
    case 'hero':       html = buildHero(slide, idx);                           break;
    case 'split':      html = buildSplit(slide, idx, L === 'image_left_text_right'); break;
    default:           html = buildContent(slide, idx);                        break;
  }

  viewport.innerHTML = html;
  counter.textContent = `${idx+1} / ${SLIDES.length}`;
  progress.style.width = `${((idx+1) / SLIDES.length) * 100}%`;
  document.getElementById('btnPrev').disabled = idx === 0;
  document.getElementById('btnNext').disabled = idx === SLIDES.length - 1;

  _loadPendingImages(slide);

  // Notes
  notesTxt.textContent = slide.notes || 'No speaker notes for this slide.';
}

/* ── Navigation ──────────────────────────────────────────────────────── */
window.go = function(dir) {
  const next = current + dir;
  if (next < 0 || next >= SLIDES.length) return;
  current = next;
  render(current);
  flashUI();
};

window.goTo = function(idx) {
  if (idx < 0 || idx >= SLIDES.length) return;
  current = idx;
  render(current);
  flashUI();
};

/* ── Notes ───────────────────────────────────────────────────────────── */
window.toggleNotes = function() {
  showNotes = !showNotes;
  notes.classList.toggle('visible', showNotes);
  document.getElementById('btnNotes').classList.toggle('active', showNotes);
};

/* ── Fullscreen ──────────────────────────────────────────────────────── */
window.toggleFullscreen = function() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(()=>{});
  } else {
    document.exitFullscreen();
  }
};
document.addEventListener('fullscreenchange', () => {
  document.getElementById('fsIcon').className =
    document.fullscreenElement ? 'bi bi-fullscreen-exit' : 'bi bi-fullscreen';
});

/* ── UI auto-hide ────────────────────────────────────────────────────── */
function flashUI() {
  ss.classList.add('show-ui');
  clearTimeout(uiTimer);
  uiTimer = setTimeout(() => { if (!showNotes) ss.classList.remove('show-ui'); }, 3500);
}
ss.addEventListener('mousemove', flashUI);
ss.addEventListener('touchstart', flashUI, { passive: true });

/* ── Keyboard ────────────────────────────────────────────────────────── */
document.addEventListener('keydown', e => {
  switch (e.key) {
    case 'ArrowRight': case ' ': case 'PageDown':
      e.preventDefault(); go(1); break;
    case 'ArrowLeft': case 'PageUp':
      e.preventDefault(); go(-1); break;
    case 'Escape':
      window.location.href = "{% url 'lessons:lesson_detail' course.pk plan.pk %}"; break;
    case 'n': case 'N': toggleNotes(); break;
    case 'f': case 'F': toggleFullscreen(); break;
    case 'Home': current = 0; render(0); flashUI(); break;
    case 'End':  current = SLIDES.length - 1; render(current); flashUI(); break;
  }
});

/* ── Click to navigate ───────────────────────────────────────────────── */
viewport.addEventListener('click', e => {
  if (e.target.closest('button, a')) return;
  const rect = viewport.getBoundingClientRect();
  (e.clientX - rect.left < rect.width / 2) ? go(-1) : go(1);
});

/* ── Touch / swipe ───────────────────────────────────────────────────── */
let touchX = 0;
ss.addEventListener('touchstart', e => { touchX = e.touches[0].clientX; }, { passive: true });
ss.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchX;
  if (Math.abs(dx) > 50) go(dx < 0 ? 1 : -1);
}, { passive: true });

/* ── Boot ────────────────────────────────────────────────────────────── */
if (!SLIDES || SLIDES.length === 0) {
  viewport.innerHTML = '<div style="color:#94a3b8;text-align:center;padding:3rem;font-size:1.1rem;">No slides found. Please generate a presentation first.</div>';
} else {
  render(0);
}
flashUI();

})();
</script>
</body>
</html>
