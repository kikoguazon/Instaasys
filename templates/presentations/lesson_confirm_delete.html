{% extends 'base.html' %}
{% block page_title %}Delete Lesson{% endblock %}
{% block content %}
<div style="max-width:480px;">
  <div class="page-card text-center">
    <i class="bi bi-exclamation-triangle-fill text-danger" style="font-size:2.5rem;"></i>
    <h5 class="mt-3 fw-bold">Delete "{{ plan.topic }}"?</h5>
    <p class="text-muted">This will permanently remove the lesson plan and its PowerPoint file.</p>
    <div class="d-flex gap-2 justify-content-center mt-4">
      <a href="{% url 'lessons:lesson_detail' course.pk plan.pk %}"
         class="btn btn-outline-secondary">Cancel</a>
      <form method="post" class="d-inline">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, delete it</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
