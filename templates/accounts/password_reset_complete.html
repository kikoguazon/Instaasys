{% extends 'base.html' %}
{% block auth_content %}
<style>
  *, *::before, *::after { box-sizing: border-box; }
  body { font-family: 'Inter', system-ui, sans-serif; margin: 0; }

  .auth-shell {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f8fafc;
    padding: 2rem;
  }

  .auth-form-box {
    width: 100%;
    max-width: 400px;
    background: #fff;
    border-radius: 16px;
    padding: 2.5rem;
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    text-align: center;
  }

  .success-icon {
    width: 60px; height: 60px;
    background: linear-gradient(135deg, #10b981, #059669);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.5rem;
    color: #fff;
    margin: 0 auto 1.5rem;
  }

  .auth-form-title {
    font-size: 1.4rem;
    font-weight: 800;
    color: #0f172a;
    margin-bottom: .5rem;
    letter-spacing: -.02em;
  }
  .auth-form-sub {
    font-size: .85rem;
    color: #64748b;
    margin-bottom: 2rem;
    line-height: 1.5;
  }

  .btn-primary {
    padding: .75rem 1.5rem;
    border-radius: 9px;
    font-size: .875rem;
    font-weight: 700;
    background: linear-gradient(135deg, #4f46e5, #6d28d9);
    border: none;
    color: #fff;
    cursor: pointer;
    transition: all .2s;
    text-decoration: none;
    display: inline-block;
  }
  .btn-primary:hover {
    opacity: .92;
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(79,70,229,.35);
    color: #fff;
  }
</style>

<div class="auth-shell">
  <div class="auth-form-box">
    <div class="success-icon">
      <i class="bi bi-check-lg"></i>
    </div>

    <h2 class="auth-form-title">Password Updated</h2>
    <p class="auth-form-sub">
      Your password has been successfully updated. You can now sign in with your new password.
    </p>

    <a href="{% url 'accounts:login' %}" class="btn btn-primary">Sign In Now</a>
  </div>
</div>
{% endblock %}
