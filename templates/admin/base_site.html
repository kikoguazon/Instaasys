{% extends "admin/base.html" %}

{% block title %}{{ title }} | INSTAASYS{% endblock %}

{% block branding %}
<div style="display:flex;align-items:center;gap:.7rem;">
  <div style="width:34px;height:34px;border-radius:9px;
              background:linear-gradient(135deg,#4f46e5,#6d28d9);
              display:flex;align-items:center;justify-content:center;
              font-size:.95rem;color:#fff;font-weight:800;flex-shrink:0;">I</div>
  <div>
    <div style="font-size:.95rem;font-weight:800;color:#fff;line-height:1.1;">INSTAASYS</div>
    <div style="font-size:.65rem;color:rgba(255,255,255,.55);letter-spacing:.06em;text-transform:uppercase;">Administration</div>
  </div>
</div>
{% endblock %}

{% block userlinks %}
<a href="/accounts/portal/" style="
  display:inline-flex;align-items:center;gap:.35rem;
  padding:.35rem .8rem;border-radius:7px;
  background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);
  color:#e0e7ff;font-size:.78rem;font-weight:600;text-decoration:none;
  transition:background .15s;margin-right:.75rem;
  " onmouseover="this.style.background='rgba(255,255,255,.22)'"
     onmouseout="this.style.background='rgba(255,255,255,.12)'">
  &#8592; Portal
</a>
{{ block.super }}
{% endblock %}

{% block extrastyle %}
{{ block.super }}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ── Base ─────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; }
body, input, select, textarea, button {
  font-family: 'Inter', system-ui, sans-serif !important;
  font-size: 14px !important;
}
body {
  background: #f1f5f9 !important;
  color: #0f172a !important;
}

/* ── Hide sidebar entirely ────────────────────────────────────────── */
#nav-sidebar,
.toggle-nav-sidebar,
#nav-sidebar-toggle-label { display: none !important; }
#main { margin-left: 0 !important; }

/* ── Header ───────────────────────────────────────────────────────── */
#header {
  background: linear-gradient(135deg, #312e81, #4f46e5) !important;
  padding: .8rem 1.5rem !important;
  height: auto !important;
  box-shadow: 0 2px 10px rgba(79,70,229,.3) !important;
  display: flex !important;
  align-items: center !important;
  justify-content: space-between !important;
}
#branding h1 { display: none !important; }
#user-tools {
  font-size: .78rem !important;
  color: rgba(255,255,255,.75) !important;
}
#user-tools a, #user-tools a:visited {
  color: #c7d2fe !important;
  font-weight: 600 !important;
  text-decoration: none !important;
}
#user-tools a:hover { color: #fff !important; }

/* ── Breadcrumbs ──────────────────────────────────────────────────── */
div.breadcrumbs {
  background: #fff !important;
  border-bottom: 1px solid #e2e8f0 !important;
  padding: .55rem 1.5rem !important;
  font-size: .78rem !important;
  color: #64748b !important;
}
div.breadcrumbs a { color: #6366f1 !important; font-weight: 600 !important; text-decoration: none !important; }
div.breadcrumbs a:hover { color: #4f46e5 !important; }

/* ── Content wrapper ──────────────────────────────────────────────── */
#content-main, .colMS .content-area { float: none !important; width: 100% !important; }
#content { padding: 1.25rem 1.5rem !important; }
#content h1 {
  font-size: 1.3rem !important;
  font-weight: 800 !important;
  color: #0f172a !important;
  margin: 0 0 1rem !important;
}

/* ── Module / Card ────────────────────────────────────────────────── */
.module {
  background: #fff !important;
  border: 1px solid #e2e8f0 !important;
  border-radius: 12px !important;
  box-shadow: 0 1px 4px rgba(0,0,0,.04) !important;
  overflow: hidden !important;
  margin-bottom: 1.1rem !important;
}
.module h2, .module caption {
  background: #f8fafc !important;
  color: #374151 !important;
  font-size: .72rem !important;
  font-weight: 700 !important;
  letter-spacing: .07em !important;
  text-transform: uppercase !important;
  border-bottom: 1px solid #e2e8f0 !important;
  padding: .65rem 1rem !important;
  margin: 0 !important;
}
.module table { width: 100% !important; border-collapse: collapse !important; }
.module th {
  background: #f8fafc !important;
  color: #475569 !important;
  font-size: .72rem !important;
  font-weight: 700 !important;
  letter-spacing: .06em !important;
  text-transform: uppercase !important;
  padding: .6rem 1rem !important;
  border-bottom: 1px solid #e2e8f0 !important;
}
.module td { padding: .55rem 1rem !important; border-bottom: 1px solid #f1f5f9 !important; color: #374151 !important; }
.module tr:last-child td { border-bottom: none !important; }
.module tr:hover td { background: #fafbff !important; }
.module td a { color: #6366f1 !important; font-weight: 600 !important; text-decoration: none !important; }
.module td a:hover { color: #4f46e5 !important; }

/* ── Change list table ────────────────────────────────────────────── */
#result_list {
  border-collapse: collapse !important;
  width: 100% !important;
  background: #fff !important;
}
#result_list thead th {
  background: #f8fafc !important;
  color: #475569 !important;
  font-size: .72rem !important;
  font-weight: 700 !important;
  letter-spacing: .07em !important;
  text-transform: uppercase !important;
  padding: .65rem 1rem !important;
  border-bottom: 2px solid #e2e8f0 !important;
  white-space: nowrap !important;
}
#result_list thead th a,
#result_list thead th a:visited { color: #475569 !important; text-decoration: none !important; }
#result_list thead th.sorted a { color: #6366f1 !important; }
#result_list tbody tr { border-bottom: 1px solid #f1f5f9 !important; transition: background .1s !important; }
#result_list tbody tr:hover { background: #fafbff !important; }
#result_list tbody td {
  padding: .65rem 1rem !important;
  color: #374151 !important;
  font-size: .84rem !important;
  border: none !important;
  vertical-align: middle !important;
}
#result_list tbody td a { color: #6366f1 !important; font-weight: 600 !important; text-decoration: none !important; }
#result_list tbody td a:hover { color: #4f46e5 !important; }
#result_list tbody td.action-checkbox { width: 1.5rem !important; }

/* ── Changelist actions ───────────────────────────────────────────── */
.actions {
  background: #f8fafc !important;
  border: 1px solid #e2e8f0 !important;
  border-radius: 10px !important;
  padding: .5rem .75rem !important;
  margin-bottom: .75rem !important;
  display: flex !important;
  align-items: center !important;
  gap: .5rem !important;
  flex-wrap: wrap !important;
}
.actions select {
  border: 1px solid #d1d5db !important;
  border-radius: 7px !important;
  padding: .38rem .65rem !important;
  font-size: .82rem !important;
  color: #374151 !important;
  background: #fff !important;
}

/* ── Paginator ────────────────────────────────────────────────────── */
.paginator {
  background: #fff !important;
  border-top: 1px solid #e2e8f0 !important;
  padding: .55rem 1rem !important;
  font-size: .8rem !important;
  color: #64748b !important;
  border-radius: 0 0 12px 12px !important;
}
.paginator a {
  padding: .28rem .6rem !important;
  border-radius: 6px !important;
  font-weight: 600 !important;
  color: #6366f1 !important;
  text-decoration: none !important;
}
.paginator a:hover { background: #eef2ff !important; }
.paginator .this-page {
  padding: .28rem .6rem !important;
  border-radius: 6px !important;
  font-weight: 700 !important;
  background: #6366f1 !important;
  color: #fff !important;
}

/* ── Filter sidebar ───────────────────────────────────────────────── */
#changelist-filter {
  background: #fff !important;
  border: 1px solid #e2e8f0 !important;
  border-radius: 12px !important;
  box-shadow: 0 1px 4px rgba(0,0,0,.04) !important;
  overflow: hidden !important;
  margin-left: 1rem !important;
}
#changelist-filter h2 {
  background: #f8fafc !important;
  color: #374151 !important;
  font-size: .72rem !important;
  font-weight: 700 !important;
  letter-spacing: .07em !important;
  text-transform: uppercase !important;
  padding: .65rem 1rem !important;
  margin: 0 !important;
  border-bottom: 1px solid #e2e8f0 !important;
}
#changelist-filter h3 {
  font-size: .76rem !important;
  font-weight: 700 !important;
  color: #6366f1 !important;
  padding: .6rem 1rem .2rem !important;
  margin: 0 !important;
}
#changelist-filter ul { margin: 0 !important; padding: 0 0 .5rem !important; list-style: none !important; }
#changelist-filter ul li a {
  display: block !important;
  padding: .32rem 1rem !important;
  font-size: .81rem !important;
  color: #475569 !important;
  text-decoration: none !important;
  transition: background .1s !important;
}
#changelist-filter ul li a:hover { background: #f1f5f9 !important; color: #6366f1 !important; }
#changelist-filter ul li.selected a { color: #6366f1 !important; font-weight: 700 !important; }

/* ── Search ───────────────────────────────────────────────────────── */
#toolbar {
  background: #fff !important;
  border: 1px solid #e2e8f0 !important;
  border-radius: 10px !important;
  padding: .55rem .75rem !important;
  margin-bottom: .75rem !important;
  display: flex !important;
  align-items: center !important;
  gap: .5rem !important;
}
#searchbar {
  border: 1px solid #d1d5db !important;
  border-radius: 7px !important;
  padding: .38rem .65rem !important;
  font-size: .82rem !important;
  flex: 1 !important;
  outline: none !important;
}
#searchbar:focus { border-color: #6366f1 !important; box-shadow: 0 0 0 3px rgba(99,102,241,.12) !important; }

/* ── Forms ────────────────────────────────────────────────────────── */
.form-row {
  padding: .7rem 0 !important;
  border-bottom: 1px solid #f1f5f9 !important;
}
.form-row:last-child { border-bottom: none !important; }
.aligned label {
  color: #374151 !important;
  font-size: .82rem !important;
  font-weight: 600 !important;
}
input[type=text], input[type=password], input[type=email],
input[type=number], input[type=url], select, textarea {
  border: 1px solid #d1d5db !important;
  border-radius: 7px !important;
  padding: .4rem .65rem !important;
  font-size: .82rem !important;
  color: #0f172a !important;
  background: #fff !important;
  transition: border-color .15s, box-shadow .15s !important;
}
input[type=text]:focus, input[type=password]:focus, input[type=email]:focus,
input[type=number]:focus, input[type=url]:focus, select:focus, textarea:focus {
  outline: none !important;
  border-color: #6366f1 !important;
  box-shadow: 0 0 0 3px rgba(99,102,241,.12) !important;
}
.help { color: #94a3b8 !important; font-size: .76rem !important; margin-top: .2rem !important; display: block !important; }
.errorlist li {
  color: #dc2626 !important;
  font-size: .78rem !important;
  background: #fef2f2 !important;
  border: 1px solid #fecaca !important;
  border-radius: 6px !important;
  padding: .3rem .65rem !important;
  margin-bottom: .3rem !important;
}

/* ── Buttons ──────────────────────────────────────────────────────── */
.button, input[type=submit], input[type=button],
.submit-row input, a.button, button[type=submit] {
  background: linear-gradient(135deg, #4f46e5, #6d28d9) !important;
  color: #fff !important;
  border: none !important;
  border-radius: 7px !important;
  padding: .48rem 1.1rem !important;
  font-size: .82rem !important;
  font-weight: 700 !important;
  cursor: pointer !important;
  transition: opacity .2s !important;
  text-decoration: none !important;
  font-family: 'Inter', sans-serif !important;
  display: inline-flex !important;
  align-items: center !important;
}
.button:hover, input[type=submit]:hover,
.submit-row input:hover { opacity: .88 !important; color: #fff !important; }
a.deletelink, .deletelink {
  background: linear-gradient(135deg, #dc2626, #b91c1c) !important;
  color: #fff !important;
  border-radius: 7px !important;
  padding: .42rem .9rem !important;
  font-weight: 700 !important;
  font-size: .8rem !important;
  text-decoration: none !important;
  display: inline-flex !important;
  align-items: center !important;
}
.submit-row {
  background: #f8fafc !important;
  border-top: 1px solid #e2e8f0 !important;
  border-radius: 0 0 12px 12px !important;
  padding: .75rem 1rem !important;
  display: flex !important;
  flex-wrap: wrap !important;
  align-items: center !important;
  gap: .5rem !important;
}
input#changelist-search-submit {
  background: linear-gradient(135deg,#4f46e5,#6d28d9) !important;
  border-radius: 7px !important;
  padding: .38rem .8rem !important;
  border: none !important;
}

/* ── Messages ─────────────────────────────────────────────────────── */
ul.messagelist { margin: 0 0 1rem !important; padding: 0 !important; list-style: none !important; }
ul.messagelist li {
  padding: .65rem 1rem !important;
  border-radius: 8px !important;
  font-size: .82rem !important;
  font-weight: 600 !important;
  margin-bottom: .4rem !important;
  border-left: 4px solid !important;
}
ul.messagelist li.success { background:#f0fdf4 !important; color:#166534 !important; border-color:#22c55e !important; }
ul.messagelist li.warning { background:#fffbeb !important; color:#92400e !important; border-color:#f59e0b !important; }
ul.messagelist li.error   { background:#fef2f2 !important; color:#991b1b  !important; border-color:#ef4444 !important; }

/* ── Inline groups ────────────────────────────────────────────────── */
.inline-group {
  border: 1px solid #e2e8f0 !important;
  border-radius: 12px !important;
  overflow: hidden !important;
  margin-bottom: 1rem !important;
}
.inline-group h2 {
  background: #f8fafc !important;
  border-bottom: 1px solid #e2e8f0 !important;
  font-size: .72rem !important;
  font-weight: 700 !important;
  letter-spacing: .07em !important;
  text-transform: uppercase !important;
  color: #374151 !important;
  padding: .65rem 1rem !important;
  margin: 0 !important;
}
.add-row a { color: #6366f1 !important; font-weight: 600 !important; font-size: .8rem !important; }

/* ── Dashboard app list ───────────────────────────────────────────── */
#content-related { display: none !important; }
.app-list .module { break-inside: avoid !important; }
</style>
{% endblock %}
