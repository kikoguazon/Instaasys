{% extends 'accounts/course_base.html' %}
{% block course_content %}

<div class="page-card text-center" style="max-width:480px;margin:0 auto;">
  <h5 class="fw-bold mb-3">Delete Attendance Session</h5>
  <p class="text-muted">
    Are you sure you want to delete the attendance session for
    <strong>{{ session.date|date:"M d, Y" }}</strong>?
    This will remove all student records for this date.
  </p>
  <form method="post">
    {% csrf_token %}
    <div class="d-flex gap-2 justify-content-center">
      <a href="{% url 'attendance:attendance_list' course.pk %}"
         class="btn btn-outline-secondary">Cancel</a>
      <button type="submit" class="btn btn-danger">
        <i class="bi bi-trash me-1"></i> Delete
      </button>
    </div>
  </form>
</div>

{% endblock %}
